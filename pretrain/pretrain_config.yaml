# --- General ---
exp_name: bridgevla_pretrain_coco
output_dir: /DATA/disk1/zyz/projects/BridgeVLA_sam/data/bridgevla_data/logs/pretrain

# --- Data ---
image_folder: /DATA/disk1/zyz/projects/BridgeVLA_sam/data/bridgevla_data/pretrain_data
json_detection_path: /DATA/disk1/zyz/projects/BridgeVLA_sam/data/bridgevla_data/pretrain_data/detection_data.json
img_size: 224
img_patch_size: 14

# --- Optimisation ---
bs: 32
lr: 5e-5
weight_decay: 0.01          # AdamW weight decay
num_train_epochs: 8
# Two-stage — PaliGemma frozen for the first `freeze_epochs` epochs, then
# unfrozen. Accepts fractions: e.g. 0.5 triggers the transition halfway
# through epoch 0.
freeze_epochs: 0.2
warmup_steps: 200           # linear warmup per stage (re-applied on stage 2)
dataloader_num_workers: 8

# --- Logging / saving ---
# Checkpoint is saved at the end of every epoch (pretrain_epoch_{i}.pth)
# plus a pretrain_last.pth pointer.
logging_steps: 10
save_total_limit: 30        # keep last N epoch checkpoints (0 = keep all)

# --- SwanLab ---
swanlab_project: bridgevla_pretrain

# --- Inference / test_inference (branches == 3) ---
checkpoint_dir: PATH_TO_PRETRAIN_CHECKPOINT.pth
test_save_path: ./pretrain_debug.png
